<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Quiz de Futebol{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap via CDN (substitui o css/bootstrap.min.css local que não temos) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Estilo neon reaproveitado do template original, sem JS */
        body {
            background: #0d0d0e;
            color: #e4e4e4;
            font-family: 'Nunito', sans-serif;
        }
        h1, h2, h3, h4 { font-weight: 700; color: #ffffff; }

        .navbar { background: #0f0f11 !important; box-shadow: 0 2px 15px rgba(0,0,0,0.5); }
        .navbar-brand { color: #00aaff !important; font-weight: 800; }

        article {
            padding: 40px;
            margin-top: 40px;
            background: #161616;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }

        .game-box {
            background: #1f1f21;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .question { font-size: 1.5rem; margin-bottom: 20px; color: #ffffff; }

        /* Alternativas viram botões de formulário (submit), sem onclick JS */
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: linear-gradient(90deg, #222 0%, #2a2a2d 100%);
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #2e2e2e;
            color: #e4e4e4;
            transition: 0.25s;
        }
        .option-btn:hover { transform: scale(1.02); background: #2f2f33; color: #fff; }
        .option-btn.correta { background: #008000 !important; color: #fff; }
        .option-btn.errada { background: #800000 !important; color: #fff; }

        .btn-neon {
            background: linear-gradient(45deg, #00ccff, #0066ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            padding: 12px 30px;
            font-size: 1.2rem;
        }
        .btn-neon:hover { color: #fff; box-shadow: 0 0 15px #00ccff; }

        .start-title {
            font-size: 2.8rem;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #0099ff;
        }

        #resultBox { color: #00d4ff; margin-top: 25px; }

        footer { background: #0d0d0e; color: #999; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg p-3">
        <span class="navbar-brand">⚽ Quiz de Futebol</span>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-warning mt-3" role="alert">
                    {% for msg in messages %}{{ msg }}{% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-4 mt-5">
        <small>Quiz de Futebol &copy; 2026</small>
    </footer>
</body>
</html>
